- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hourCycle: h23
      locale: ru-RU

- greeting:
    text_size: l
    text: "Добро пожаловать"

- customapi:
    url: http://172.18.0.1:8770/weather
    refreshInterval: 1800000
    mappings:
      - field: temp
        label: "🌡️ Температура"
        format: float
        suffix: " °C"
      - field: feels_like
        label: "🤔 Ощущается"
        format: float
        suffix: " °C"
      - field: condition
        label: "☁️ Погода"
        format: text
      - field: humidity
        label: "💧 Влажность"
        format: number
        suffix: "%"
      - field: wind
        label: "💨 Ветер"
        format: float
        suffix: " км/ч"

- customapi:
    url: http://172.18.0.1:8770/health-stats
    refreshInterval: 1800000
    mappings:
      - field: smoke_days
        label: "🚭 Без сигарет"
        format: number
        suffix: " дней"
      - field: weight
        label: "⚖️ Вес"
        format: float
        suffix: " кг"
      - field: diff
        label: "📍 До цели"
        format: float
        suffix: " кг"
