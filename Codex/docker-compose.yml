services:
  backend:
    build:
      context: ./backend
    container_name: rpg-tracker-backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-jarvis_memory}
      DB_USER: ${DB_USER:-jarvis}
      DB_PASSWORD: ${DB_PASSWORD:-}
      API_KEY: ${API_KEY:-}
      HERO_NAME: ${HERO_NAME:-Сергей}
      HERO_CLASS: ${HERO_CLASS:-Воин — Путь Трансформации}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088,https://mcp.myserver-ai.ru}
    expose:
      - "8000"
    networks:
      - postgres_shared
      - tracker_internal

  nginx:
    image: nginx:1.27-alpine
    container_name: rpg-tracker-nginx
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:80"
    environment:
      API_KEY: ${API_KEY:-}
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - tracker_internal

networks:
  postgres_shared:
    external: true
    name: ${EXTERNAL_POSTGRES_NETWORK:-shared-postgres}
  tracker_internal:
