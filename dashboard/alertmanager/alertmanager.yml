global:
  resolve_timeout: 5m

route:
  receiver: 'telegram'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      repeat_interval: 1h

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN'
        chat_id: YOUR_TELEGRAM_CHAT_ID
        parse_mode: 'Markdown'
        message: |-
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🔴 *{{ .Labels.alertname }}*{{ else }}✅ *{{ .Labels.alertname }}* — восстановлено{{ end }}
          {{ .Annotations.summary }}
          {{ if .Annotations.description }}_{{ .Annotations.description }}_{{ end }}
          {{ end }}

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'instance']
