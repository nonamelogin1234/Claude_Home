global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: myserver-ai

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # VPS: метрики хоста
  - job_name: 'node-vps'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'vps'

  # VPS: Docker контейнеры
  - job_name: 'cadvisor-vps'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: 'vps'

  # PostgreSQL jarvis_memory
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Домашний сервер (через WireGuard wg1)
  - job_name: 'node-homeserver'
    scrape_interval: 30s
    static_configs:
      - targets: ['10.8.0.27:9100']
        labels:
          host: 'homeserver'
